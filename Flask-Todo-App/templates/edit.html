{% extends "base.html" %}

{% block content %}

<div class="card shadow p-4">

    <h2 class="mb-4">
        Edit Task
    </h2>

    <form method="POST">

        <input
            type="text"
            name="task"
            value="{{ task }}"
            class="form-control mb-3"
            required>

        <button class="btn btn-success">
            Update Task
        </button>

        <a href="/" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
